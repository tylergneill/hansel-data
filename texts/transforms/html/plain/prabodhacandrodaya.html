      <h1 id="act_1">§ act 1</h1>
      <div class="speech plain-text">
        <p>rāmaḥ — ((praviśya)) namaḥ sarvebhyaḥ. idaṃ vanaṃ paśyāmi. </p>
      </div>
      <div class="speech plain-text">
        <p>sītā — kajjaṃ ca paḍhantī. (kāryaṃ ca paṭhantī.)</p>
